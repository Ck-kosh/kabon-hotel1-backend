services:
  - type: web
    name: kabon-hotel-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python manage.py migrate --noinput && python manage.py collectstatic --noinput && gunicorn kabon_hotel.wsgi:application --bind 0.0.0.0:$PORT --workers 2
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: kabon-hotel-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: kabon-hotel-backend.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://kabon-hotel1-frontend.vercel.app
      - key: CSRF_TRUSTED_ORIGINS
        value: https://kabon-hotel1-frontend.vercel.app
      - key: PORT
        value: "8000"

databases:
  - name: kabon-hotel-db
    plan: free
