services:
  - type: web
    name: kabon-hotel1-backend
    runtime: python
    plan: free
    buildCommand: ./build.sh
    startCommand: gunicorn kabon_hotel.wsgi:application --bind 0.0.0.0:$PORT
    healthCheckPath: /health/
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: kabon-hotel1-backend.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://kabon-hotel1-frontend.vercel.app
      - key: CSRF_TRUSTED_ORIGINS
        value: https://kabon-hotel1-frontend.vercel.app
      - key: DATABASE_URL
        fromDatabase:
          name: kabon-hotel1-db
          property: connectionString
      - key: CLOUDINARY_URL
        sync: false
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false

databases:
  - name: kabon-hotel1-db
    plan: free
